name: Update HubSpot Knowledge Base

on:
  schedule:
    # Every Sunday at 02:00 UTC
    - cron: "0 2 * * 0"

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      create_pr:
        description: "Create a PR instead of direct commit"
        required: false
        default: "true"
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Setup Node ────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Install Playwright + browsers ─────────────────────────────────────
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # ── Run scraper ───────────────────────────────────────────────────────
      - name: Scrape HubSpot documentation
        run: node scripts/scraper.js
        env:
          CI: true

      # ── Check for changes ─────────────────────────────────────────────────
      - name: Check for knowledge base changes
        id: check_changes
        run: |
          git diff --quiet src/knowledge/ || echo "changes=true" >> $GITHUB_OUTPUT
          if [ -f .changes-detected ]; then
            echo "files=$(cat .changes-detected | tr '\n' ',')" >> $GITHUB_OUTPUT
            rm -f .changes-detected
          fi

      # ── Rebuild dist if changes ───────────────────────────────────────────
      - name: Rebuild MCP server
        if: steps.check_changes.outputs.changes == 'true'
        run: npm run build

      # ── Generate changelog ────────────────────────────────────────────────
      - name: Generate changelog entry
        if: steps.check_changes.outputs.changes == 'true'
        run: node scripts/generate-changelog.js

      # ── Commit directly to main (scheduled runs) ──────────────────────────
      - name: Commit and push updates
        if: >
          steps.check_changes.outputs.changes == 'true' &&
          (github.event_name == 'schedule' ||
           github.event.inputs.create_pr == 'false')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/knowledge/ dist/ CHANGELOG.md
          git commit -m "chore: automated knowledge base update $(date -u +'%Y-%m-%d')

          Updated files: ${{ steps.check_changes.outputs.files }}

          Scraped from HubSpot developer documentation.
          Auto-generated by update-knowledge workflow."
          git push

      # ── Create PR (manual runs with create_pr=true) ────────────────────────
      - name: Create Pull Request
        if: >
          steps.check_changes.outputs.changes == 'true' &&
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.create_pr == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "auto-update/knowledge-${{ github.run_number }}"
          title: "docs: automated HubSpot knowledge base update"
          body: |
            ## Automated Knowledge Base Update

            This PR was generated by the weekly scraper workflow.

            ### Changed files
            ${{ steps.check_changes.outputs.files }}

            ### What to check
            - Review `CHANGELOG.md` for a summary of changes
            - Check `src/knowledge/*.json` for any unexpected removals
            - Verify new entries look correct before merging

            ### How to merge
            If everything looks good, merge this PR and the knowledge base will be live immediately.

            ---
            *Auto-generated by [update-knowledge workflow](.github/workflows/update-knowledge.yml)*
          commit-message: |
            chore: automated knowledge base update ${{ github.run_number }}

            Scraped from HubSpot developer documentation.
          labels: "automated,knowledge-update"
          delete-branch: true

      # ── No changes summary ────────────────────────────────────────────────
      - name: Report no changes
        if: steps.check_changes.outputs.changes != 'true'
        run: echo "✅ Knowledge base is already up to date. No changes detected."
